<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyber Green/Teal Gradients -->
    <linearGradient id="cyberGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:0.2" />
    </linearGradient>

    <radialGradient id="aura" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </radialGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Digital Glitch Pattern -->
    <pattern id="glitchPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect x="10" y="20" width="30" height="2" fill="#3fb950" opacity="0.3" />
      <rect x="60" y="45" width="20" height="1" fill="#00ffcc" opacity="0.2" />
      <rect x="5" y="80" width="40" height="3" fill="#3fb950" opacity="0.4" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0d1117" />
  <rect width="512" height="512" fill="url(#aura)" />
  <rect width="512" height="512" fill="url(#glitchPattern)" />

  <!-- Cyber Octocat Figure -->
  <g transform="translate(256, 240)">
    <!-- Aura behind head -->
    <circle cx="0" cy="-40" r="140" fill="url(#cyberGlow)" opacity="0.4" />

    <!-- Main Silhouette (Octocat style) -->
    <path d="M-100 -20 C-100 -90 -50 -110 0 -110 C50 -110 100 -90 100 -20 C100 40 70 80 0 80 C-70 80 -100 40 -100 -20 Z" fill="#010409" />

    <!-- Cyber Goggles -->
    <g filter="url(#neonGlow)">
      <rect x="-75" y="-55" width="65" height="40" rx="10" fill="#1f2428" stroke="#3fb950" stroke-width="3" />
      <rect x="10" y="-55" width="65" height="40" rx="10" fill="#1f2428" stroke="#3fb950" stroke-width="3" />
      <!-- Glowing Lenses -->
      <rect x="-68" y="-48" width="51" height="26" rx="6" fill="#3fb950" fill-opacity="0.6" />
      <rect x="17" y="-48" width="51" height="26" rx="6" fill="#3fb950" fill-opacity="0.6" />
      <!-- Digital HUD details -->
      <rect x="-60" y="-42" width="10" height="2" fill="#ffffff" fill-opacity="0.8" />
      <rect x="25" y="-42" width="10" height="2" fill="#ffffff" fill-opacity="0.8" />
    </g>

    <!-- Face details -->
    <path d="M-10 15 L0 25 L10 15" fill="none" stroke="#8b949e" stroke-width="2" stroke-linecap="round" />

    <!-- Cyber Tails (Geometric/Fluid mix) -->
    <g stroke="#010409" stroke-width="15" fill="none" stroke-linecap="round">
      <path d="M-60 60 C-120 60 -150 20 -140 -20" stroke="#010409" />
      <path d="M-40 75 C-80 120 -130 110 -150 70" stroke="#010409" />
      <path d="M40 75 C80 120 130 110 150 70" stroke="#010409" />
      <path d="M60 60 C120 60 150 20 140 -20" stroke="#010409" />
    </g>
    <!-- Highlights for Tails -->
    <g stroke="#3fb950" stroke-width="2" fill="none" stroke-opacity="0.4">
      <path d="M-140 -20 C-150 20 -120 60 -60 60" />
      <path d="M140 -20 C150 20 120 60 60 60" />
    </g>
  </g>

  <!-- Typography (GitHub Style) -->
  <text x="256" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="52" fill="#ffffff" text-anchor="middle" style="letter-spacing: -1px;">SNAPKITTY</text>
  <text x="256" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="500" font-size="22" fill="#3fb950" text-anchor="middle" style="letter-spacing: 12px; text-transform: uppercase;">Collective</text>

  <!-- Glitch Accents (Top/Bottom) -->
  <rect x="40" y="40" width="80" height="4" fill="#3fb950" opacity="0.6" />
  <rect x="392" y="468" width="80" height="4" fill="#00ffcc" opacity="0.6" />
</svg>