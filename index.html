<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapKitty | Sovereign OS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --fiori-bg: #edeff0;
            --fiori-shell: #354a5f;
            --fiori-accent: #0070d2;
            --horizon-card: #ffffff;
        }
        body, html { margin: 0; padding: 0; font-family: '72', Arial, sans-serif; background: var(--fiori-bg); height: 100vh; overflow: hidden; }

        .gateway-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: linear-gradient(135deg, #1c2d3d 0%, #354a5f 100%);
            color: white; text-align: center;
        }

        .logo-box { margin-bottom: 40px; animation: fadeInDown 0.8s ease; }
        .logo-box h1 { font-size: 3rem; font-weight: 300; letter-spacing: -1px; margin: 0; }
        .logo-box p { font-family: 'Courier New', monospace; color: #a5b4fc; margin-top: 10px; }

        .auth-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 40px; width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease;
        }

        .btn-deploy {
            background: var(--fiori-accent); color: white; border: none;
            padding: 15px 30px; font-size: 1.1rem; border-radius: 6px;
            cursor: pointer; width: 100%; transition: all 0.3s;
            text-transform: uppercase; font-weight: bold; margin-top: 20px;
        }
        .btn-deploy:hover { background: #005fb8; transform: translateY(-2px); }

        .telemetry {
            margin-top: 50px; font-family: 'Courier New', monospace; font-size: 0.8rem;
            color: rgba(255,255,255,0.4); text-align: left; width: 300px;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="gateway-container">
        <div class="logo-box">
            <h1>SnapKitty <span>Sovereign OS</span></h1>
            <p>BIFROST INTELLIGENCE BRIDGE v2.2.0</p>
        </div>

        <div class="auth-card">
            <p style="margin-bottom: 30px; color: #cbd5e1;">Enterprise CRM for Developers & High-Velocity Freelancers.</p>
            <button class="btn-deploy" onclick="initiateLogin()">Deploy to Collective</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.3);">SSO via Microsoft Entra ID</p>
        </div>

        <div class="telemetry">
            <div>> SYSTEM: ONLINE</div>
            <div>> BIFROST: STABLE [collectivekitty.com]</div>
            <div>> INTEL: SCS_780_CALIBRATED</div>
            <div>> STATUS: READY_FOR_DEPLOYMENT</div>
        </div>
    </div>

    <script>
        function initiateLogin() {
            console.log(">>> [GATEWAY] Initiating Bifrost Handshake...");
            const apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:3000'
                : 'https://api.collectivekitty.com';

            // Redirect to Backend Auth
            window.location.href = apiUrl + '/auth/login';
        }
    </script>
</body>
</html>
