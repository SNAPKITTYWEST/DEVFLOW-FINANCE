<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 400 120" width="400" height="120">
  <!-- Cat face circle -->
  <circle cx="60" cy="60" r="45" fill="none" stroke="#333" stroke-width="2.5"/>
  
  <!-- Left ear -->
  <path d="M 25 35 L 15 10 L 40 25 Z" fill="#333" stroke="#333" stroke-width="1"/>
  <!-- Right ear -->
  <path d="M 95 35 L 105 10 L 80 25 Z" fill="#333" stroke="#333" stroke-width="1"/>
  
  <!-- Inner ears -->
  <path d="M 28 32 L 22 18 L 37 27 Z" fill="#ff9ec6" opacity="0.6"/>
  <path d="M 92 32 L 98 18 L 83 27 Z" fill="#ff9ec6" opacity="0.6"/>
  
  <!-- Code arrow eyebrows -->
  <!-- Left eyebrow < -->
  <path d="M 38 48 L 48 44 L 48 52" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right eyebrow > -->
  <path d="M 82 48 L 72 44 L 72 52" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Left eye (normal) -->
  <ellipse cx="48" cy="58" rx="6" ry="7" fill="#333"/>
  <ellipse cx="48" cy="56" rx="3" ry="3.5" fill="#fff" opacity="0.8"/>
  
  <!-- Right eye - gear/purple -->
  <circle cx="72" cy="58" r="6" fill="#7C3AED"/>
  <!-- Gear teeth -->
  <rect x="66" y="52" width="12" height="3" rx="1" fill="#7C3AED" transform="rotate(0, 72, 58)"/>
  <rect x="66" y="52" width="12" height="3" rx="1" fill="#7C3AED" transform="rotate(45, 72, 58)"/>
  <rect x="66" y="52" width="12" height="3" rx="1" fill="#7C3AED" transform="rotate(90, 72, 58)"/>
  <rect x="66" y="52" width="12" height="3" rx="1" fill="#7C3AED" transform="rotate(135, 72, 58)"/>
  <!-- Gear center -->
  <circle cx="72" cy="58" r="2.5" fill="#0a0a0a"/>
  
  <!-- Nose -->
  <ellipse cx="60" cy="65" rx="3" ry="2" fill="#ff9ec6"/>
  
  <!-- Whiskers -->
  <!-- Left whiskers -->
  <line x1="20" y1="62" x2="40" y2="64" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="68" x2="40" y2="68" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="74" x2="40" y2="72" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right whiskers -->
  <line x1="100" y1="62" x2="80" y2="64" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="68" x2="80" y2="68" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="74" x2="80" y2="72" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M 45 78 Q 60 88 75 78" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Text: snapKitty Collective -->
  <text x="130" y="55" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" fill="#000000">snap</text>
  <text x="220" y="55" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" fill="#7C3AED">Kitty</text>
  
  <text x="130" y="78" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#52525b" letter-spacing="0.3em">Collective</text>
  
  <text x="130" y="100" font-family="monospace" font-weight="600" font-size="20" fill="#7C3AED">∞</text>
</svg>