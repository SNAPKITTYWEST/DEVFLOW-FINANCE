version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: snapkitty-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-snapkitty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snapkitty_dev}
      POSTGRES_DB: ${POSTGRES_DB:-snapkitty}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snapkitty}"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-api:
    build:
      context: ./snapkitty-api
      dockerfile: Dockerfile
    container_name: snapkitty-node
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-snapkitty}:${POSTGRES_PASSWORD:-snapkitty_dev}@postgres:5432/${POSTGRES_DB:-snapkitty}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./snapkitty-api:/app
      - /app/node_modules
    command: npm run dev

  python-service:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: snapkitty-python
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-snapkitty}:${POSTGRES_PASSWORD:-snapkitty_dev}@postgres:5432/${POSTGRES_DB:-snapkitty}
      PYTHONUNBUFFERED: 1
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./orchestrator:/app

  java-auth:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: snapkitty-java
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-snapkitty}:${POSTGRES_PASSWORD:-snapkitty_dev}@postgres:5432/${POSTGRES_DB:-snapkitty}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_prod}
      JWT_EXPIRY: 3600
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: