<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign OS | S/4HANA Style</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Fiori Shell Header -->
        <header class="sap-shell">
            <div class="sap-shell-brand">
                SNAPKITTY <span>Sovereign OS v2.2.0</span>
            </div>
            <input type="text" class="sap-shell-search" placeholder="Search (T-Codes, Vendors, Deals...)">
            <div class="sap-shell-actions">
                <span id="sync-status" class="sync-status">
                    <span class="pulse"></span> BIFROST: STABLE
                </span>
            </div>
        </header>

        <!-- Main Execution Area -->
        <main id="main-content">
            <!-- Launchpad (Default View) -->
            <div id="launchpad" class="launchpad fade-in">
                <!-- FI Tiles -->
                <div class="tile" onclick="setView('fi')">
                    <div class="tile-header">General Ledger</div>
                    <div class="tile-content" id="tile-balance">$2.5M</div>
                    <div class="tile-footer">Financials (FI)</div>
                </div>

                <!-- MM Tiles -->
                <div class="tile" onclick="setView('mm')">
                    <div class="tile-header">Manage Purchase Orders</div>
                    <div class="tile-content" id="tile-pos">42</div>
                    <div class="tile-footer">Materials (MM)</div>
                </div>

                <!-- SD Tiles -->
                <div class="tile" onclick="setView('sd')">
                    <div class="tile-header">Sales Dashboard</div>
                    <div class="tile-content" id="tile-deals">12</div>
                    <div class="tile-footer">Sales & Distribution (SD)</div>
                </div>

                <!-- NEW: CRM Tiles -->
                <div class="tile" onclick="setView('contacts')">
                    <div class="tile-header">Contacts</div>
                    <div class="tile-content" id="tile-contacts">--</div>
                    <div class="tile-footer">Master Data</div>
                </div>

                <div class="tile" onclick="setView('tasks')">
                    <div class="tile-header">Active Tasks</div>
                    <div class="tile-content" id="tile-tasks">--</div>
                    <div class="tile-footer">Governance</div>
                </div>

                <!-- Intelligence Tiles -->
                <div class="tile" onclick="setView('intelligence')">
                    <div class="tile-header">Sovereign Credit (SCS)</div>
                    <div class="tile-content" id="tile-scs" style="color:var(--fiori-success)">780</div>
                    <div class="tile-footer">Intelligence Hub</div>
                </div>

                <!-- Trust Tiles -->
                <div class="tile" onclick="setView('vault')">
                    <div class="tile-header">Trust Vault</div>
                    <div class="tile-content">99%</div>
                    <div class="tile-footer">Governance</div>
                </div>
            </div>

            <!-- View Container (Populated by app.js) -->
            <div id="view-container" style="display:none;"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
